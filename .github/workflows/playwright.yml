name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Checkout Playwright repo
      - name: Checkout Playwright Repo
        uses: actions/checkout@v4

      # Checkout ShopKart repo
      - name: Checkout ShopKart App
        uses: actions/checkout@v4
        with:
          repository: jaisingh-builds/sdet-retail-app
          ref: shopkart
          path: sdet-retail-app

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Playwright dependencies
      - name: Install Playwright Dependencies
        run: npm install

      # Install ShopKart root dependencies
      - name: Install ShopKart Root Dependencies
        run: |
          cd sdet-retail-app
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd sdet-retail-app/frontend
          npm install

      - name: Install Backend Dependencies
        run: |
          cd sdet-retail-app/backend
          npm install


      # Create .env
      - name: Create .env
        run: |
          cd sdet-retail-app
          cp .env.example .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      # Verify Vite installation
      - name: Verify Vite
        run: |
          cd sdet-retail-app/frontend
          npx vite --version

      # Start ShopKart
      - name: Start ShopKart
        run: |
          cd sdet-retail-app
          chmod +x scripts/shopkart-start.sh
          ./scripts/shopkart-start.sh > app.log 2>&1 &
          sleep 20
          cat app.log

      - name: Print App Log
        if: always()
        run: |
          cd sdet-retail-app
          echo "===== APP LOG ====="
          cat app.log    
      

# Wait until application is up
      - name: Wait for ShopKart
        run: |
         npx wait-on http://localhost:8080 --timeout 180000

# Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

# Run tests
      - name: Run Playwright Tests
        run: npx playwright test ./tests/endToend.spec.ts

# Print app logs if test fails
      - name: Print App Logs
        if: failure()
        run: |
         cd sdet-retail-app
         cat app.log || true

# Upload Playwright report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
         name: playwright-report
         path: playwright-report/
         retention-days: 30          
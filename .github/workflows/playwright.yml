name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Playwright Repo
        uses: actions/checkout@v4

      - name: Checkout ShopKart App Repo
        uses: actions/checkout@v4
        with:
          repository: <ORG_NAME>/sdet-retail-app
          path: sdet-retail-app
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Playwright Dependencies
        run: npm ci

      - name: Install ShopKart Dependencies
        run: |
          cd sdet-retail-app
          npm ci

      - name: Start ShopKart
        run: |
          cd sdet-retail-app
          chmod +x scripts/shopkart-start.sh
          ./scripts/shopkart-start.sh &
      
      - name: Wait for ShopKart
        run: |
          npx wait-on http://localhost:8080 --timeout 120000

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test ./tests/endToend.spec.ts

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30